---
# Test: Multi-Organisation User Workflow
- launchApp
- tapOn: "email-input"
- inputText: "multi@example.com"
- tapOn: "password-input"
- inputText: "multi123"
- tapOn: "login-button"

# Test organisation switching
# - assertVisible: "Organisation Selector" # Not found
- tapOn: "Organisation Selector"
- assertVisible: "Primary Org"
- assertVisible: "Secondary Org"

# Switch to secondary org and verify role change
- tapOn: "Secondary Org"
- assertVisible: "Projects Overview"
# Permissions should change based on role in secondary org
- assertNotVisible: "Create Project" # Member in secondary org
- assertVisible: "View Projects"

# Switch back to primary org
- tapOn: "Organisation Selector"
- tapOn: "Primary Org"
- assertVisible: "Create Project" # Admin in primary org