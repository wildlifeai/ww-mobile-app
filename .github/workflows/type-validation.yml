name: Type Synchronization Validation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-types:
    name: Validate Database Types
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Authenticate to Supabase
        run: |
          echo "Authenticating to Supabase cloud..."
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "⚠️  Warning: SUPABASE_ACCESS_TOKEN not configured"
            exit 1
          fi
          npx supabase login --token "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      - name: Link to cloud-dev project
        run: |
          echo "Linking to cloud-dev Supabase instance..."
          npx supabase link --project-ref nuhwmubvygxyddkycmpa
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Generate fresh types from cloud-dev
        run: |
          echo "Generating types from cloud-dev Supabase instance..."
          npx supabase gen types typescript --project-id nuhwmubvygxyddkycmpa > /tmp/fresh-types.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Compare with committed types
        run: |
          echo "Comparing generated types with committed types..."
          if ! diff -u --strip-trailing-cr src/types/database.types.ts /tmp/fresh-types.ts; then
            echo ""
            echo "❌ ERROR: Types are out of sync with cloud-dev schema"
            echo ""
            echo "To fix this issue, run the following command:"
            echo "  npm run types:cloud-dev"
            echo ""
            echo "Then commit the updated types:"
            echo "  git add src/types/database.types.ts"
            echo "  git commit -m 'chore: sync database types'"
            echo ""
            exit 1
          fi
          echo "✅ Types are synchronized"

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Run tests
        run: npm test -- --passWithNoTests
        env:
          NODE_OPTIONS: "--experimental-vm-modules"

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: validate-types
    if: always()

    steps:
      - name: Check validation result
        run: |
          if [ "${{ needs.validate-types.result }}" == "success" ]; then
            echo "✅ All type validations passed"
          else
            echo "❌ Type validation failed"
            exit 1
          fi
