name: E2E UI Tests

on:
  pull_request:

jobs:
  maestro-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Generate Android Native Directory
        run: npx expo prebuild --no-install --platform android

      - name: Build Android App for Emulator (x86_64)
        working-directory: ./android
        run: ./gradlew assembleDebug

      # Install KVM for hardware acceleration on Ubuntu runner
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to Path
        run: echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro Tests on Local Emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # Install the APK and run Maestro while the emulator is running
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            npm run test:maestro:offline

      - name: Upload Maestro Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots-and-logs
          path: ~/.maestro/tests/
          retention-days: 7
