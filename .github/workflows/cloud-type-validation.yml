name: Cloud Type Validation

# This workflow validates that committed types match cloud Supabase instances
# Prevents deployments with stale cloud types

on:
  pull_request:
    branches: [dev]
    paths:
      - 'src/types/database.types.ts'
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - '.github/workflows/cloud-type-validation.yml'
  push:
    branches: [dev]
    paths:
      - 'src/types/database.types.ts'
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - '.github/workflows/cloud-type-validation.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to validate'
        required: true
        type: choice
        options:
          - cloud-dev
          - cloud-prod

jobs:
  validate-cloud-dev:
    name: Validate Cloud Dev Types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run on PRs to main or manual dispatch with cloud-dev selected
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'cloud-dev')

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.101.0  # pinned: unpinned CLIs broke CI when new versions shipped (2026-06-11)

      - name: Authenticate to Supabase
        run: |
          echo "Authenticating to Supabase cloud..."
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "⚠️  Warning: SUPABASE_ACCESS_TOKEN not configured"
            exit 1
          fi
          npx supabase@2.101.0 login --token "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      - name: Link to cloud-dev project
        run: |
          echo "Linking to cloud-dev Supabase instance..."
          npx supabase@2.101.0 link --project-ref qegeovogqxiouqbrxmnh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Generate fresh types from cloud-dev
        run: |
          echo "Generating types from cloud-dev Supabase instance..."
          npx supabase@2.101.0 gen types typescript --project-id qegeovogqxiouqbrxmnh > /tmp/cloud-dev-types.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Compare with committed types
        id: compare
        run: |
          echo "Comparing generated types with committed types..."
          if diff -u --strip-trailing-cr src/types/database.types.ts /tmp/cloud-dev-types.ts > /tmp/type-diff.txt; then
            echo "✅ Types are synchronized with cloud-dev"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ ERROR: Types are out of sync with cloud-dev"
            echo ""
            echo "To fix this issue, run:"
            echo "  npm run types:cloud-dev"
            echo ""
            echo "Then commit the updated types:"
            echo "  git add src/types/database.types.ts"
            echo "  git commit -m 'chore(types): sync with cloud-dev schema'"
            echo ""
            echo "First 30 lines of diff:"
            head -30 /tmp/type-diff.txt
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload diff artifact
        if: failure() && steps.compare.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: type-diff-cloud-dev
          path: /tmp/type-diff.txt
          retention-days: 7

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:unit -- --passWithNoTests
        env:
          NODE_OPTIONS: "--experimental-vm-modules"

  validate-cloud-prod:
    name: Validate Cloud Prod Types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run on manual dispatch with cloud-prod selected
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'cloud-prod'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.101.0  # pinned: unpinned CLIs broke CI when new versions shipped (2026-06-11)

      - name: Authenticate to Supabase
        run: |
          echo "Authenticating to Supabase cloud..."
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "⚠️  Warning: SUPABASE_ACCESS_TOKEN not configured"
            exit 1
          fi
          npx supabase@2.101.0 login --token "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      - name: Link to cloud-prod (staging) project
        run: |
          echo "Linking to staging Supabase instance..."
          npx supabase@2.101.0 link --project-ref nuhwmubvygxyddkycmpa
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Generate fresh types from cloud-prod (staging)
        run: |
          echo "Generating types from staging Supabase instance..."
          npx supabase@2.101.0 gen types typescript --project-id nuhwmubvygxyddkycmpa > /tmp/cloud-prod-types.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Compare with committed types
        id: compare
        run: |
          echo "Comparing generated types with committed types..."
          if diff -u --strip-trailing-cr src/types/database.types.ts /tmp/cloud-prod-types.ts > /tmp/type-diff.txt; then
            echo "✅ Types are synchronized with staging (cloud-prod)"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ ERROR: Types are out of sync with staging (cloud-prod)"
            echo ""
            echo "To fix this issue, run:"
            echo "  npm run types:cloud-prod"
            echo ""
            echo "Then commit the updated types:"
            echo "  git add src/types/database.types.ts"
            echo "  git commit -m 'chore(types): sync with cloud-prod schema'"
            echo ""
            echo "First 30 lines of diff:"
            head -30 /tmp/type-diff.txt
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload diff artifact
        if: failure() && steps.compare.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: type-diff-cloud-prod
          path: /tmp/type-diff.txt
          retention-days: 7

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:unit -- --passWithNoTests
        env:
          NODE_OPTIONS: "--experimental-vm-modules"

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-cloud-dev]
    if: always()

    steps:
      - name: Check validation result
        run: |
          if [ "${{ needs.validate-cloud-dev.result }}" == "success" ] || [ "${{ needs.validate-cloud-dev.result }}" == "skipped" ]; then
            echo "✅ Cloud type validation passed or skipped"
          else
            echo "❌ Cloud type validation failed"
            echo ""
            echo "Cloud types are out of sync with the Supabase instance."
            echo "See the job logs above for details on how to fix."
            exit 1
          fi
