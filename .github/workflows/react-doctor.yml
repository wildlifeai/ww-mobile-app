name: React Doctor Review

on:
  pull_request:
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Show file details per rule'
        type: boolean
        default: true

jobs:
  react-doctor:
    name: React Doctor Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Run React Doctor
        id: doctor
        # Action tag and CLI version are pinned as a pair: the action passes flags
        # the CLI must understand, and @main + version:latest drift independently
        # (broke 2026-06-11: @main passed --scope, which stable 0.5.1 rejects).
        # Bump both together (Dependabot proposes the action tag).
        uses: millionco/react-doctor@v2.2.7
        with:
          directory: '.'
          node-version: '24'
          scope: 'full'
          blocking: 'error'
          project: ''
          version: '0.5.1'
