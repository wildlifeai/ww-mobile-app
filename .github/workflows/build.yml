name: Build and Submit with EAS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*" # Trigger on version tags like v1.0.0

jobs:
  build-and-submit:
    name: EAS Build and Submit
    runs-on: ubuntu-latest
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.0

      - name: Checkout repo from branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Create Google Services files
        run: |
          echo "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}" > google-services.json
          echo "${{ secrets.IOS_GOOGLE_SERVICES_PLIST }}" > GoogleService-Info.plist

      - name: Build with EAS
        run: eas build --platform all --profile production --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_MAPS_API_KEY_ANDROID: ${{ secrets.GOOGLE_MAPS_API_KEY_ANDROID }}
          GOOGLE_MAPS_API_KEY_IOS: ${{ secrets.GOOGLE_MAPS_API_KEY_IOS }}

      - name: Create Firebase Service Account file for submission
        run: echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" > firebase-service-account.json

      - name: Submit to TestFlight and Firebase App Distribution
        run: eas submit --platform all --profile production --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
