# Claude Flow Configuration for Wildlife Watcher MVP2
project:
  name: wildlife-watcher-mvp2
  phase: foundation-layer
  current_task: task-10-redux-integration
  
swarm:
  topology: adaptive
  max_agents: 8
  memory_mode: distributed
  session_id: mvp2-foundation
  
sparc:
  modes:
    - architect
    - tdd
    - spec-pseudocode
    - code
    - integration
  default_mode: tdd
  
agents:
  foundation:
    - auth-agent
    - data-agent
    - redux-agent
  stream_a:
    - project-agent
    - admin-agent
  stream_b:
    - deployment-agent
    - ble-agent
  stream_c:
    - device-agent
    - sync-agent
  integration:
    - quality-agent
    - integration-agent

workflows:
  foundation_sequential:
    - task-9-auth # COMPLETED
    - task-10-redux # IN PROGRESS
    - task-11-sqlite # PENDING
  streams_parallel:
    stream_a: [task-12, task-13, task-14]
    stream_b: [task-15, task-16, task-17] 
    stream_c: [task-18, task-19, task-20]
  integration_final: [task-21, task-22, task-23]

testing:
  framework: maestro
  tdd_approach: london_school
  coverage_target: 80
  
architecture:
  offline_first: true
  backend: supabase
  communication: 
    - ble
    - lorawan_webhook
  multi_tenancy: organisation_scoped
  roles: [ww_admin, project_admin, project_member]